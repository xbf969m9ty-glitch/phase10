<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Phase 10" />
  <title>Phase 10 Punkterechner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      background: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* Stoppuhr */
    #stopwatch-bar {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #stopwatch-bar.visible { display: flex; }
    #stopwatch-display {
      font-size: 26px;
      font-weight: 700;
      color: #007aff;
      letter-spacing: 2px;
    }

    /* Runden-Counter */
    #round-bar {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #round-bar.visible { display: flex; }
    #round-bar span { font-size: 17px; font-weight: 600; }
    #round-bar .round-count {
      font-size: 22px;
      font-weight: 700;
      color: #007aff;
      min-width: 32px;
      text-align: center;
    }
    .round-btn {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .round-btn:active { background: #005ecb; }

    /* Buttons oben */
    .top-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    #add-btn    { background: #007aff; color: white; }
    #start-btn  { background: #34c759; color: white; }
    #pause-btn  { background: #ff9500; color: white; display: none; }
    #cancel-btn { background: #ff3b30; color: white; display: none; }

    .top-btn:active { filter: brightness(0.88); }

    .player-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .player-name { font-size: 18px; font-weight: 700; }

    .remove-btn {
      background: #ff3b30;
      color: white;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .label { font-size: 14px; color: #666; width: 90px; }

    .value {
      font-size: 18px;
      font-weight: 600;
      min-width: 40px;
      text-align: center;
    }

    .plus-btn {
      background: #34c759;
      color: white;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .plus-btn:active { background: #248a3d; }

    .edit-btn {
      background: #ff9500;
      color: white;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 15px;
      cursor: pointer;
    }
    .edit-btn:active { background: #c97700; }

    .round-input {
      width: 70px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 85%;
      max-width: 340px;
      text-align: center;
    }

    .modal h2 { font-size: 20px; margin-bottom: 16px; }

    .modal input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm { background: #007aff; color: white; }
    .btn-cancel  { background: #e5e5ea; color: #333; }

    /* Win modal */
    #win-modal .modal {
      max-width: 380px;
      max-height: 85vh;
      overflow-y: auto;
    }
    #win-modal .modal h2 { font-size: 24px; margin-bottom: 8px; }
    #win-modal .modal .win-sub { font-size: 16px; color: #555; margin-bottom: 16px; }

    .scoreboard {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      text-align: left;
    }
    .scoreboard th {
      font-size: 13px;
      color: #888;
      border-bottom: 1px solid #eee;
      padding: 6px 8px;
    }
    .scoreboard td {
      padding: 8px;
      font-size: 15px;
      border-bottom: 1px solid #f2f2f7;
    }
    .scoreboard tr.winner td { font-weight: 700; color: #007aff; }

    #win-modal .modal button {
      width: 100%;
      padding: 14px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Abbrechen-Bestätigung */
    #cancel-modal .modal p {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Phase 10 Punkterechner</h1>

  <!-- Stoppuhr -->
  <div id="stopwatch-bar">
    <span id="stopwatch-display">00:00</span>
  </div>

  <!-- Runden-Counter -->
  <div id="round-bar">
    <span>Runde</span>
    <span class="round-count" id="round-counter">1</span>
    <button class="round-btn" onclick="incrementRound()">+</button>
  </div>

  <button id="add-btn"    class="top-btn" onclick="openAddModal()">+ Spieler hinzufügen</button>
  <button id="start-btn"  class="top-btn" onclick="startGame()">Spiel starten</button>
  <button id="pause-btn"  class="top-btn" onclick="togglePause()">Pause</button>
  <button id="cancel-btn" class="top-btn" onclick="openCancelModal()">Spiel abbrechen</button>

  <div id="players"></div>

  <!-- Add Player Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h2>Spieler hinzufügen</h2>
      <input type="text" id="name-input" placeholder="Name eingeben" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAddModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="addPlayer()">Hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Edit Points Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>Punkte bearbeiten</h2>
      <input type="number" id="edit-input" placeholder="Neuer Punktestand" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="saveEdit()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Abbrechen-Bestätigung -->
  <div class="modal-overlay" id="cancel-modal">
    <div class="modal">
      <h2>Spiel abbrechen?</h2>
      <p>Alle Punkte und der Fortschritt werden zurückgesetzt.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeCancelModal()">Zurück</button>
        <button class="btn-confirm" style="background:#ff3b30" onclick="cancelGame()">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div class="modal-overlay" id="win-modal">
    <div class="modal">
      <h2>Gewonnen!</h2>
      <p class="win-sub" id="win-text"></p>
      <table class="scoreboard" id="scoreboard"></table>
      <button onclick="playAgain()">Nochmal spielen</button>
    </div>
  </div>

  <script>
    let players = {};
    let playerNames = {};
    let winTarget = null;
    let editTarget = null;
    let roundCount = 1;

    // Stoppuhr
    let swSeconds = 0;
    let swInterval = null;
    let swRunning = false;

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      return `00:${String(m).padStart(2,'0')}`;
    }

    function startGame() {
      if (Object.keys(players).length === 0) {
        alert('Bitte zuerst mindestens einen Spieler hinzufügen.');
        return;
      }
      // UI umschalten
      document.getElementById('add-btn').style.display = 'none';
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'block';
      document.getElementById('cancel-btn').style.display = 'block';
      document.getElementById('round-bar').classList.add('visible');
      document.getElementById('stopwatch-bar').classList.add('visible');

      // Entfernen-Buttons verstecken
      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'none');

      // Stoppuhr starten
      swSeconds = 0;
      swRunning = true;
      swInterval = setInterval(() => {
        if (swRunning) {
          swSeconds++;
          document.getElementById('stopwatch-display').textContent = formatTime(swSeconds);
        }
      }, 1000);
    }

    function togglePause() {
      const btn = document.getElementById('pause-btn');
      if (swRunning) {
        swRunning = false;
        btn.textContent = 'Weiter';
        btn.style.background = '#34c759';
      } else {
        swRunning = true;
        btn.textContent = 'Pause';
        btn.style.background = '#ff9500';
      }
    }

    function openCancelModal() {
      document.getElementById('cancel-modal').classList.add('visible');
    }

    function closeCancelModal() {
      document.getElementById('cancel-modal').classList.remove('visible');
    }

    function cancelGame() {
      closeCancelModal();
      resetGame();
    }

    function resetGame() {
      // Stoppuhr stoppen
      clearInterval(swInterval);
      swInterval = null;
      swRunning = false;
      swSeconds = 0;
      document.getElementById('stopwatch-display').textContent = '00:00';

      // Spieler zurücksetzen
      Object.keys(players).forEach(id => {
        players[id].phase = 0;
        players[id].total = 0;
        document.getElementById('phase-' + id).textContent = '0';
        document.getElementById('total-' + id).textContent = '0';
        document.getElementById('round-' + id).value = '0';
      });

      // Runden-Counter zurücksetzen
      roundCount = 1;
      document.getElementById('round-counter').textContent = '1';

      // UI zurücksetzen
      document.getElementById('add-btn').style.display = 'block';
      document.getElementById('start-btn').style.display = 'block';
      document.getElementById('pause-btn').style.display = 'none';
      document.getElementById('pause-btn').textContent = 'Pause';
      document.getElementById('pause-btn').style.background = '#ff9500';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('round-bar').classList.remove('visible');
      document.getElementById('stopwatch-bar').classList.remove('visible');

      // Entfernen-Buttons wieder anzeigen
      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'block');

      winTarget = null;
    }

    function incrementRound() {
      roundCount++;
      document.getElementById('round-counter').textContent = roundCount;
    }

    function openAddModal() {
      document.getElementById('name-input').value = '';
      document.getElementById('add-modal').classList.add('visible');
      setTimeout(() => document.getElementById('name-input').focus(), 100);
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('visible');
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addPlayer();
    });

    function openEditModal(id) {
      editTarget = id;
      document.getElementById('edit-input').value = players[id].total;
      document.getElementById('edit-modal').classList.add('visible');
      setTimeout(() => document.getElementById('edit-input').focus(), 100);
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('visible');
      editTarget = null;
    }

    function saveEdit() {
      if (editTarget === null) return;
      const val = parseInt(document.getElementById('edit-input').value);
      if (!isNaN(val)) {
        players[editTarget].total = val;
        document.getElementById('total-' + editTarget).textContent = val;
      }
      closeEditModal();
    }

    document.getElementById('edit-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEdit();
    });

    function addPlayer() {
      const name = document.getElementById('name-input').value.trim();
      if (!name) return;
      closeAddModal();

      const id = Date.now();
      players[id] = { phase: 0, total: 0 };
      playerNames[id] = name;

      const card = document.createElement('div');
      card.className = 'player-card';
      card.id = 'player-' + id;
      card.innerHTML = `
        <div class="player-header">
          <span class="player-name">${escapeHtml(name)}</span>
          <button class="remove-btn" onclick="removePlayer(${id})">✕</button>
        </div>
        <div class="row">
          <span class="label">Phase</span>
          <span class="value" id="phase-${id}">0</span>
          <button class="plus-btn" onclick="increasePhase(${id}, '${escapeHtml(name)}')">+</button>
        </div>
        <div class="row">
          <span class="label">Punkte</span>
          <span class="value" id="total-${id}">0</span>
          <button class="edit-btn" onclick="openEditModal(${id})">✎</button>
        </div>
        <div class="row">
          <span class="label">Rundenpunkte</span>
          <input class="round-input" type="number" id="round-${id}" value="0" />
          <button class="plus-btn" onclick="addPoints(${id})">+</button>
        </div>
      `;
      document.getElementById('players').appendChild(card);
    }

    function increasePhase(id, name) {
      players[id].phase++;
      document.getElementById('phase-' + id).textContent = players[id].phase;
      if (players[id].phase >= 10) {
        winTarget = id;
        clearInterval(swInterval);
        swRunning = false;
        document.getElementById('win-text').textContent = `Herzlichen Glückwunsch, ${name}!`;

        const table = document.getElementById('scoreboard');
        table.innerHTML = `<tr><th>Spieler</th><th>Phase</th><th>Punkte</th></tr>`;
        const sorted = Object.keys(players).sort((a, b) => players[a].total - players[b].total);
        sorted.forEach(pid => {
          const tr = document.createElement('tr');
          if (parseInt(pid) === id) tr.className = 'winner';
          tr.innerHTML = `<td>${escapeHtml(playerNames[pid])}</td><td>${players[pid].phase}</td><td>${players[pid].total}</td>`;
          table.appendChild(tr);
        });

        document.getElementById('win-modal').classList.add('visible');
      }
    }

    function addPoints(id) {
      const input = document.getElementById('round-' + id);
      const val = parseInt(input.value) || 0;
      players[id].total += val;
      document.getElementById('total-' + id).textContent = players[id].total;
      input.value = '0';
    }

    function removePlayer(id) {
      document.getElementById('player-' + id).remove();
      delete players[id];
      delete playerNames[id];
    }

    function playAgain() {
      document.getElementById('win-modal').classList.remove('visible');
      resetGame();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
