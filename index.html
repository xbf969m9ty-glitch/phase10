<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Phase 10" />
  <title>Phase 10 Punkterechner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    /* ── Theme variables ─────────────────────────────── */
    :root {
      --bg-from:        #1a1a2e;
      --bg-mid:         #16213e;
      --bg-to:          #0f3460;
      --accent1:        #e94560;
      --accent2:        #f5a623;
      --btn-add-from:   #667eea;
      --btn-add-to:     #764ba2;
      --modal-bg:       #1e2340;
      --focus-border:   rgba(233,69,96,0.6);
      --shadow1:        rgba(233,69,96,0.4);
      --shadow2:        rgba(233,69,96,0.45);
      --shadow3:        rgba(233,69,96,0.5);
      --shadow-add:     rgba(102,126,234,0.4);
    }

    body.theme-pink {
      --bg-from:        #2d1020;
      --bg-mid:         #3d1535;
      --bg-to:          #5c1550;
      --accent1:        #ff4da6;
      --accent2:        #ffb3d9;
      --btn-add-from:   #e040a0;
      --btn-add-to:     #b5179e;
      --modal-bg:       #2d1020;
      --focus-border:   rgba(255,77,166,0.6);
      --shadow1:        rgba(255,77,166,0.4);
      --shadow2:        rgba(255,77,166,0.45);
      --shadow3:        rgba(255,77,166,0.5);
      --shadow-add:     rgba(224,64,160,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      min-height: 100vh;
      padding: 16px 14px 32px;
      transition: background 0.4s ease;
    }

    /* ── Header ─────────────────────────────────────── */
    .app-header {
      text-align: center;
      padding: 20px 16px 16px;
      margin-bottom: 16px;
      position: relative;
    }
    .app-header h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent1));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      letter-spacing: -0.5px;
    }
    .app-header .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      font-weight: 500;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── Theme button & picker ──────────────────────── */
    .theme-btn {
      position: absolute;
      top: 20px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      backdrop-filter: blur(8px);
    }
    .theme-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.18); }

    .theme-picker {
      display: none;
      position: absolute;
      top: 68px;
      right: 14px;
      background: rgba(30,35,64,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 14px;
      z-index: 200;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      flex-direction: column;
      gap: 10px;
      min-width: 150px;
    }
    .theme-picker.open { display: flex; }

    .theme-picker-title {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .theme-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .theme-option:hover { background: rgba(255,255,255,0.07); }
    .theme-option.active { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .swatch-dark { background: linear-gradient(135deg, #1a1a2e, #0f3460); border: 1px solid rgba(255,255,255,0.15); }
    .swatch-pink { background: linear-gradient(135deg, #2d1020, #5c1550); border: 1px solid rgba(255,77,166,0.3); }

    .theme-option span {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    /* ── Stoppuhr ───────────────────────────────────── */
    #stopwatch-bar {
      display: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 20px;
      margin-bottom: 12px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }
    #stopwatch-bar.visible { display: flex; }
    .sw-icon { font-size: 18px; }
    #stopwatch-display {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent1);
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      transition: color 0.4s;
    }

    /* ── Runden-Counter ─────────────────────────────── */
    #round-bar {
      display: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 20px;
      margin-bottom: 12px;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(10px);
    }
    #round-bar.visible { display: flex; }
    #round-bar .round-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #round-bar .round-count {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent2);
      min-width: 36px;
      text-align: center;
      transition: color 0.4s;
    }
    .round-btn {
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      color: white;
      border: none;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s, background 0.4s;
      box-shadow: 0 4px 12px var(--shadow1);
    }
    .round-btn:active { transform: scale(0.93); box-shadow: none; }

    /* ── Buttons oben ───────────────────────────────── */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn-group-single { margin-bottom: 16px; }
    .top-btn {
      display: block;
      width: 100%;
      padding: 15px 14px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      letter-spacing: 0.2px;
    }
    .top-btn:active { transform: scale(0.96); filter: brightness(0.9); }

    #add-btn {
      background: linear-gradient(135deg, var(--btn-add-from), var(--btn-add-to));
      color: white;
      box-shadow: 0 4px 16px var(--shadow-add);
      grid-column: 1 / -1;
      transition: background 0.4s, box-shadow 0.4s;
    }
    #start-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      box-shadow: 0 4px 16px rgba(56,239,125,0.35);
      grid-column: 1 / -1;
    }
    #pause-btn {
      background: linear-gradient(135deg, #f5a623, #f7b733);
      color: white;
      box-shadow: 0 4px 16px rgba(245,166,35,0.4);
      display: none;
    }
    #cancel-btn {
      background: rgba(255,59,48,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,59,48,0.3);
      box-shadow: none;
      display: none;
    }
    #cancel-btn:active { background: rgba(255,59,48,0.25); }

    /* ── Player Cards ───────────────────────────────── */
    .player-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      animation: slideIn 0.3s ease;
      transition: box-shadow 0.2s;
    }
    .player-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .player-name-wrap { display: flex; align-items: center; gap: 10px; }
    .player-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .player-name { font-size: 17px; font-weight: 700; color: white; }

    .remove-btn {
      background: rgba(255,59,48,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,59,48,0.25);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .remove-btn:active { background: rgba(255,59,48,0.3); }

    /* ── Phase dots ─────────────────────────────────── */
    .phase-dots {
      display: flex;
      gap: 5px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .phase-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      transition: all 0.25s ease;
    }
    .phase-dot.done {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border-color: transparent;
      color: white;
      box-shadow: 0 2px 8px var(--shadow3);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      width: 80px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .value {
      font-size: 20px;
      font-weight: 800;
      min-width: 44px;
      text-align: center;
      color: white;
    }

    .plus-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      border: none;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 3px 10px rgba(56,239,125,0.35);
    }
    .plus-btn:active { transform: scale(0.9); box-shadow: none; }

    .minus-btn {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s, background 0.15s;
      line-height: 1;
    }
    .minus-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.18); }

    .edit-btn {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .edit-btn:active { background: rgba(255,255,255,0.2); }

    .round-input {
      width: 72px;
      padding: 9px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      color: white;
      font-family: inherit;
    }
    .round-input:focus {
      outline: none;
      border-color: var(--focus-border);
      background: rgba(255,255,255,0.12);
    }
    .round-input::placeholder { color: rgba(255,255,255,0.3); }

    /* ── Divider ────────────────────────────────────── */
    .card-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 12px 0;
    }

    .total-badge {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-left: auto;
    }

    /* ── Modal ──────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      justify-content: center;
      align-items: flex-end;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--modal-bg);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: slideUp 0.28s cubic-bezier(0.34,1.3,0.64,1);
      transition: background 0.4s;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 800;
      color: white;
      margin-bottom: 18px;
    }

    .modal input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      color: white;
      margin-bottom: 16px;
    }
    .modal input:focus {
      outline: none;
      border-color: var(--focus-border);
      background: rgba(255,255,255,0.12);
    }
    .modal input::placeholder { color: rgba(255,255,255,0.3); }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: filter 0.15s, transform 0.1s;
    }
    .modal-btns button:active { transform: scale(0.97); filter: brightness(0.9); }

    .btn-confirm {
      background: linear-gradient(135deg, var(--btn-add-from), var(--btn-add-to));
      color: white;
      transition: background 0.4s;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Win Modal ──────────────────────────────────── */
    #win-modal .modal {
      border-radius: 24px 24px 0 0;
      max-height: 88vh;
      overflow-y: auto;
    }
    .win-trophy { font-size: 52px; margin-bottom: 8px; }
    #win-modal .modal h2 { font-size: 26px; color: var(--accent2); transition: color 0.4s; }
    #win-modal .modal .win-sub { font-size: 15px; color: rgba(255,255,255,0.55); margin-bottom: 20px; margin-top: 6px; }

    .scoreboard {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      text-align: left;
    }
    .scoreboard th {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 8px 10px;
    }
    .scoreboard td {
      padding: 10px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 500;
    }
    .scoreboard tr.winner td { font-weight: 800; color: var(--accent2); transition: color 0.4s; }
    .scoreboard tr.winner td:first-child::before { content: '🏆 '; }

    #win-modal .modal button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 20px var(--shadow2);
      transition: filter 0.15s, transform 0.1s, background 0.4s;
    }
    #win-modal .modal button:active { transform: scale(0.97); filter: brightness(0.9); }

    /* ── Abbrechen-Bestätigung ──────────────────────── */
    #cancel-modal .modal p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #cancel-modal .btn-confirm {
      background: linear-gradient(135deg, #ff3b30, #ff6b6b);
    }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>Phase 10</h1>
    <div class="subtitle">Punkterechner</div>
    <button class="theme-btn" onclick="toggleThemePicker()" title="Design ändern">🎨</button>
    <div class="theme-picker" id="theme-picker">
      <div class="theme-picker-title">Design</div>
      <div class="theme-option active" id="opt-dark" onclick="setTheme('dark')">
        <div class="theme-swatch swatch-dark"></div>
        <span>Nacht</span>
      </div>
      <div class="theme-option" id="opt-pink" onclick="setTheme('pink')">
        <div class="theme-swatch swatch-pink"></div>
        <span>Pink</span>
      </div>
    </div>
  </div>

  <!-- Stoppuhr -->
  <div id="stopwatch-bar">
    <span class="sw-icon">⏱</span>
    <span id="stopwatch-display">00:00</span>
  </div>

  <!-- Runden-Counter -->
  <div id="round-bar">
    <span class="round-label">Runde</span>
    <span class="round-count" id="round-counter">1</span>
    <button class="round-btn" onclick="incrementRound()">+</button>
  </div>

  <div class="btn-group">
    <button id="add-btn"    class="top-btn" onclick="openAddModal()">＋ Spieler hinzufügen</button>
    <button id="start-btn"  class="top-btn" onclick="startGame()">▶ Spiel starten</button>
    <button id="pause-btn"  class="top-btn" onclick="togglePause()">⏸ Pause</button>
    <button id="cancel-btn" class="top-btn" onclick="openCancelModal()">✕ Abbrechen</button>
  </div>

  <div id="players"></div>

  <!-- Add Player Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Spieler hinzufügen</h2>
      <input type="text" id="name-input" placeholder="Name eingeben" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAddModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="addPlayer()">Hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Edit Points Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Punkte bearbeiten</h2>
      <input type="number" id="edit-input" placeholder="Neuer Punktestand" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="saveEdit()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Abbrechen-Bestätigung -->
  <div class="modal-overlay" id="cancel-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Spiel abbrechen?</h2>
      <p>Alle Punkte und der Fortschritt werden zurückgesetzt.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeCancelModal()">Zurück</button>
        <button class="btn-confirm" onclick="cancelGame()">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div class="modal-overlay" id="win-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="win-trophy">🏆</div>
      <h2>Gewonnen!</h2>
      <p class="win-sub" id="win-text"></p>
      <table class="scoreboard" id="scoreboard"></table>
      <button onclick="playAgain()">Nochmal spielen</button>
    </div>
  </div>

  <script>
    let players = {};
    let playerNames = {};
    let winTarget = null;
    let editTarget = null;
    let roundCount = 1;

    // Stoppuhr
    let swSeconds = 0;
    let swInterval = null;
    let swRunning = false;

    // ── Theme ──────────────────────────────────────────
    let currentTheme = 'dark';

    function toggleThemePicker() {
      document.getElementById('theme-picker').classList.toggle('open');
    }

    function setTheme(theme) {
      currentTheme = theme;
      document.body.classList.toggle('theme-pink', theme === 'pink');
      document.getElementById('opt-dark').classList.toggle('active', theme === 'dark');
      document.getElementById('opt-pink').classList.toggle('active', theme === 'pink');
      document.getElementById('theme-picker').classList.remove('open');
    }

    // Close picker when clicking outside
    document.addEventListener('click', e => {
      const picker = document.getElementById('theme-picker');
      if (!picker.contains(e.target) && !e.target.closest('.theme-btn')) {
        picker.classList.remove('open');
      }
    });

    // ── Stopwatch ──────────────────────────────────────
    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      return `00:${String(m).padStart(2,'0')}`;
    }

    function startGame() {
      if (Object.keys(players).length === 0) {
        alert('Bitte zuerst mindestens einen Spieler hinzufügen.');
        return;
      }
      document.getElementById('add-btn').style.display = 'none';
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'block';
      document.getElementById('cancel-btn').style.display = 'block';
      document.getElementById('round-bar').classList.add('visible');
      document.getElementById('stopwatch-bar').classList.add('visible');

      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'none');

      swSeconds = 0;
      swRunning = true;
      swInterval = setInterval(() => {
        if (swRunning) {
          swSeconds++;
          document.getElementById('stopwatch-display').textContent = formatTime(swSeconds);
        }
      }, 1000);
    }

    function togglePause() {
      const btn = document.getElementById('pause-btn');
      if (swRunning) {
        swRunning = false;
        btn.textContent = '▶ Weiter';
        btn.style.background = 'linear-gradient(135deg, #11998e, #38ef7d)';
      } else {
        swRunning = true;
        btn.textContent = '⏸ Pause';
        btn.style.background = 'linear-gradient(135deg, #f5a623, #f7b733)';
      }
    }

    function openCancelModal() {
      document.getElementById('cancel-modal').classList.add('visible');
    }

    function closeCancelModal() {
      document.getElementById('cancel-modal').classList.remove('visible');
    }

    function cancelGame() {
      closeCancelModal();
      resetGame();
    }

    function resetGame() {
      clearInterval(swInterval);
      swInterval = null;
      swRunning = false;
      swSeconds = 0;
      document.getElementById('stopwatch-display').textContent = '00:00';

      Object.keys(players).forEach(id => {
        players[id].phase = 0;
        players[id].total = 0;
        document.getElementById('phase-' + id).textContent = '0';
        document.getElementById('total-' + id).textContent = '0';
        document.getElementById('round-' + id).value = '0';
        for (let i = 1; i <= 10; i++) {
          const dot = document.getElementById(`dot-${id}-${i}`);
          if (dot) dot.classList.remove('done');
        }
      });

      roundCount = 1;
      document.getElementById('round-counter').textContent = '1';

      document.getElementById('add-btn').style.display = 'block';
      document.getElementById('start-btn').style.display = 'block';
      document.getElementById('pause-btn').style.display = 'none';
      document.getElementById('pause-btn').textContent = '⏸ Pause';
      document.getElementById('pause-btn').style.background = 'linear-gradient(135deg, #f5a623, #f7b733)';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('round-bar').classList.remove('visible');
      document.getElementById('stopwatch-bar').classList.remove('visible');

      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'block');

      winTarget = null;
    }

    function incrementRound() {
      roundCount++;
      document.getElementById('round-counter').textContent = roundCount;
    }

    // ── Add Player ─────────────────────────────────────
    function openAddModal() {
      document.getElementById('name-input').value = '';
      document.getElementById('add-modal').classList.add('visible');
      setTimeout(() => document.getElementById('name-input').focus(), 100);
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('visible');
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addPlayer();
    });

    // ── Edit Points ────────────────────────────────────
    function openEditModal(id) {
      editTarget = id;
      document.getElementById('edit-input').value = players[id].total;
      document.getElementById('edit-modal').classList.add('visible');
      setTimeout(() => document.getElementById('edit-input').focus(), 100);
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('visible');
      editTarget = null;
    }

    function saveEdit() {
      if (editTarget === null) return;
      const val = parseInt(document.getElementById('edit-input').value);
      if (!isNaN(val)) {
        players[editTarget].total = val;
        document.getElementById('total-' + editTarget).textContent = val;
      }
      closeEditModal();
    }

    document.getElementById('edit-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEdit();
    });

    // ── Add Player ─────────────────────────────────────
    function addPlayer() {
      const name = document.getElementById('name-input').value.trim();
      if (!name) return;
      closeAddModal();

      const id = Date.now();
      players[id] = { phase: 0, total: 0 };
      playerNames[id] = name;

      const initial = escapeHtml(name.charAt(0).toUpperCase());
      const safeName = escapeHtml(name);
      const dots = Array.from({length: 10}, (_, i) =>
        `<div class="phase-dot" id="dot-${id}-${i+1}">${i+1}</div>`
      ).join('');

      const card = document.createElement('div');
      card.className = 'player-card';
      card.id = 'player-' + id;
      card.innerHTML = `
        <div class="player-header">
          <div class="player-name-wrap">
            <div class="player-avatar">${initial}</div>
            <span class="player-name">${safeName}</span>
          </div>
          <button class="remove-btn" onclick="removePlayer(${id})">✕</button>
        </div>
        <div class="phase-dots" id="dots-${id}">${dots}</div>
        <div class="card-divider"></div>
        <div class="row">
          <span class="label">Phase</span>
          <button class="minus-btn" onclick="decreasePhase(${id})">−</button>
          <span class="value" id="phase-${id}">0</span>
          <button class="plus-btn" onclick="increasePhase(${id}, '${safeName}')">+</button>
        </div>
        <div class="row">
          <span class="label">Punkte</span>
          <span class="value" id="total-${id}">0</span>
          <button class="edit-btn" onclick="openEditModal(${id})">✎</button>
        </div>
        <div class="card-divider"></div>
        <div class="row">
          <span class="label">Runde +</span>
          <input class="round-input" type="number" id="round-${id}" value="0" />
          <button class="plus-btn" onclick="addPoints(${id})">+</button>
        </div>
      `;
      document.getElementById('players').appendChild(card);
    }

    // ── Phase ──────────────────────────────────────────
    function increasePhase(id, name) {
      if (players[id].phase >= 10) return;
      players[id].phase++;
      const phase = players[id].phase;
      document.getElementById('phase-' + id).textContent = phase;
      const dot = document.getElementById(`dot-${id}-${phase}`);
      if (dot) dot.classList.add('done');
      if (players[id].phase >= 10) {
        winTarget = id;
        clearInterval(swInterval);
        swRunning = false;
        document.getElementById('win-text').textContent = `Herzlichen Glückwunsch, ${name}!`;

        const table = document.getElementById('scoreboard');
        table.innerHTML = `<tr><th>Spieler</th><th>Phase</th><th>Punkte</th></tr>`;
        const sorted = Object.keys(players).sort((a, b) => players[a].total - players[b].total);
        sorted.forEach(pid => {
          const tr = document.createElement('tr');
          if (parseInt(pid) === id) tr.className = 'winner';
          tr.innerHTML = `<td>${escapeHtml(playerNames[pid])}</td><td>${players[pid].phase}</td><td>${players[pid].total}</td>`;
          table.appendChild(tr);
        });

        document.getElementById('win-modal').classList.add('visible');
      }
    }

    function decreasePhase(id) {
      if (players[id].phase <= 0) return;
      const oldPhase = players[id].phase;
      const dot = document.getElementById(`dot-${id}-${oldPhase}`);
      if (dot) dot.classList.remove('done');
      players[id].phase--;
      document.getElementById('phase-' + id).textContent = players[id].phase;
    }

    // ── Points ─────────────────────────────────────────
    function addPoints(id) {
      const input = document.getElementById('round-' + id);
      const val = parseInt(input.value) || 0;
      players[id].total += val;
      document.getElementById('total-' + id).textContent = players[id].total;
      input.value = '0';
    }

    function removePlayer(id) {
      document.getElementById('player-' + id).remove();
      delete players[id];
      delete playerNames[id];
    }

    function playAgain() {
      document.getElementById('win-modal').classList.remove('visible');
      resetGame();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
